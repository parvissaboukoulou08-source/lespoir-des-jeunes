<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz HTML</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7f9;
    margin:0;
}

header{
    background:#0b6e4f;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
    background:#0b6e4f;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
}

a{
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Quiz HTML</h1>
<p>Répondez aux questions</p>
</header>

<div class="container">

<p><b>1. Que signifie HTML ?</b></p>

<input type="radio" name="q1" value="1"> HyperText Markup Language<br>
<input type="radio" name="q1" value="0"> High Text Machine Language<br><br>

<p><b>2. Quelle balise crée un lien ?</b></p>
<input type="radio" name="q2" value="1"> &lt;a&gt;<br>
<input type="radio" name="q2" value="0"> &lt;img&gt;<br>
<button onclick="corrigerQuiz()">
Voir mon score
</button>

<p id="resultat"></p>
Voir la réponse

<br><br>

<a href="html-css.html">
<button>← Retour au cours</button>
</a>
    <script>
function corrigerQuiz() {
    let score = 0;

    if (document.querySelector('input[name="q1"]:checked')?.value == "1") {
        score++;
    }

    if (document.querySelector('input[name="q2"]:checked')?.value == "1") {
        score++;

    document.getElementById("resultat").innerHTML =
        "<h3>Votre score : " + score + "/2</h3>";
        }
    "
}
    </script>

</body>
  </html>
