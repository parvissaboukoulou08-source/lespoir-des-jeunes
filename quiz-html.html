<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz HTML</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7f9;
    margin:0;
}

header{
    background:#0b6e4f;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
    background:#0b6e4f;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
}

a{
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Quiz HTML</h1>
<p>Répondez aux questions</p>
</header>

<div class="container">

<p><b>1. Que signifie HTML ?</b></p>

<input type="radio" name="q1" value="1"> HyperText Markup Language<br>
<input type="radio" name="q1" value="0"> High Text Machine Language<br><br>

<p><b>2. Quelle balise crée un lien ?</b></p>
<input type="radio" name="q2" value="1"> &lt;a&gt;<br>
<input type="radio" name="q2" value="0"> &lt;img&gt;<br>
<button type="button" onclick="corrigerQuiz()">
Voir mon score
</button>

<p id="resultat"></p>
Voir la réponse

<br><br>

<a href="html-css.html">
<button>← Retour au cours</button>
</a>
<script>
  // Sécurité : Vérifier si l'utilisateur est bien connecté
  const sessionActive = localStorage.getItem('session_active');
  if (!sessionActive) {
    alert('Veuillez vous connecter pour passer le quiz.');
    window.location.href = 'connexion.html';
  }

  function corrigerQuiz() {
    let score = 0;

    // Récupération et vérification des réponses (valeur "1" pour la bonne réponse)
    const q1Checked = document.querySelector('input[name="q1"]:checked');
    const q2Checked = document.querySelector('input[name="q2"]:checked');

    if (!q1Checked || !q2Checked) {
      alert("Veuillez répondre à toutes les questions avant de valider !");
      return;
    }

    if (q1Checked.value === "1") score++;
    if (q2Checked.value === "1") score++;

    const divResultat = document.getElementById("resultat");

    if (score === 2) {
      divResultat.innerHTML = "<h3>🎉 Bravo ! Votre score : 2/2. Module HTML validé !</h3>";
      divResultat.style.color = "#006644";

      // Sauvegarde automatique du module réussi dans le profil
      const utilisateur = JSON.parse(sessionActive);
      
      if (!utilisateur.formationsValides.includes('HTML')) {
        utilisateur.formationsValides.push('HTML');
        
        // Mise à jour de la session locale et du stockage global
        localStorage.setItem('session_active', JSON.stringify(utilisateur));
        localStorage.setItem('user_' + utilisateur.email, JSON.stringify(utilisateur));
      }
    } else {
      divResultat.innerHTML = `<h3>😐 Votre score : ${score}/2. Réessayez pour obtenir 2/2 et valider !</h3>`;
      divResultat.style.color = "#cc0000";
    }
  }
</script>
    

</body>
  </html>
