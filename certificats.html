<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes certificats</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7f9;
}

header{
    background:#0b6e4f;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:800px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.button{
    display:inline-block;
    background:#0b6e4f;
    color:white;
    text-decoration:none;
    padding:12px 20px;
    border-radius:6px;
}

.button:hover{
    background:#09543d;
}
</style>

</head>

<body>

<header>
<h1>🏆 Mes certificats</h1>
<p>Retrouvez ici tous vos certificats.</p>
</header>

<div class="container">

<div class="card" id="blocCertificat">
  <h2>🏆 Certificat de réussite</h2>
  <h3>L'Espoir des Jeunes</h3>
  <p>Ce certificat est décerné à :</p>
  <h2 id="nomApprenant">Nom de l'apprenant</h2>
  <p>Pour avoir réussi avec succès le cours HTML et son quiz.</p>
  <p><strong>Score : 2/2</strong></p>
  <p>🎉 Félicitations !</p>
</div>

<a href="dashboard.html" class="button">- Retour au tableau de bord</a>

</div>

<script>
  const sessionActive = localStorage.getItem('session_active');
  const blocCertificat = document.getElementById('blocCertificat');

  if (sessionActive) {
    const utilisateur = JSON.parse(sessionActive);
    document.getElementById('nomApprenant').innerHTML = utilisateur.nom;

    if (utilisateur.formationsValides && utilisateur.formationsValides.includes('HTML')) {
      blocCertificat.style.display = 'block';
    } else {
      blocCertificat.innerHTML = "<h3>🔒 Vous n'avez pas encore validé ce certificat. Obtenez un score de 2/2 au Quiz HTML pour le débloquer !</h3>";
      blocCertificat.style.color = "#cc0000";
      blocCertificat.style.textAlign = "center";
    }
  } else {
    alert('Veuillez vous connecter pour accéder à vos certificats.');
    window.location.href = 'connexion.html';
  }
</script>
    
</body>
</html>
