<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - L'Espoir des Jeunes</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f7f9;
}

header{
    background:#0b6e4f;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:500px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#0b6e4f;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#0b6e4f;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#09543d;
}

a{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#0b6e4f;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>Inscription</h1>
<p>L'Espoir des Jeunes</p>
</header>

<div class="container">

<h2>Créer un compte</h2>

<form>

<input type="text" id="nom" placeholder="Nom complet" required>

<input type="email" id="email" placeholder="Adresse e-mail" required>

<input type="tel" id="telephone" placeholder="Téléphone" required>

<select id="formation" required>
<option value="">Choisir une formation</option>
<option>Informatique</option>
<option>Éducation</option>
<option>Entrepreneuriat</option>
</select>

<input type="password" id="notdepasse" placeholder="Mot de passe" required>

<input type="password" id="confirmation" placeholder="Confirmer le mot de passe" required>

<button type="submit">S'inscrire</button>
    
</form>

<a href="index.html">← Retour à l'accueil</a>

</div>

<script>
  // On écoute la soumission du formulaire
  document.querySelector('form').addEventListener('submit', function(e) {
    
    e.preventDefault(); // Empêche la page de se recharger inutilement

    // Récupération des valeurs avec vos identifiants exacts
    const nom = document.getElementById('nom').value;
    const email = document.getElementById('email').value;
    const motDePasse = document.getElementById('notdepasse').value;
    const confirmation = document.getElementById('confirmation').value;

    // Vérification que les mots de passe correspondent
    if (motDePasse !== confirmation) {
      alert('Les mots de passe ne correspondent pas.');
      return;
    }

    if (nom && email && motDePasse) {
      // Création de l'objet utilisateur
      const utilisateur = {
        nom: nom,
        email: email,
        password: motDePasse,
        formationsValides: [] // Servira pour débloquer les certificats plus tard !
      };

      // Sauvegarde locale sécurisée dans la mémoire du navigateur
      localStorage.setItem('user_' + email, JSON.stringify(utilisateur));
      
      alert('Inscription réussie ! Vous allez être redirigé vers la page de connexion.');
      window.location.href = 'connexion.html';
    } else {
      alert('Veuillez remplir tous les champs obligatoires.');
    }
  });
</script>
    
</body>
</html>
