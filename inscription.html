<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - L'Espoir des Jeunes</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7f9;
    margin:0;
}

header{
    background:#0b6e4f;
    color:white;
    text-align:center;
    padding:20px;
}

form{
    background:white;
    max-width:400px;
    margin:40px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0b6e4f;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0b6e4f;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#09543d;
}
</style>
</head>

<body>

<header>
<h1>L'Espoir des Jeunes</h1>
</header>

<form>
<h2>Créer un compte</h2>

<input type="text" placeholder="Nom complet" required>

<input type="email" placeholder="Adresse e-mail" required>

<input type="password" placeholder="Mot de passe" required>

<input type="password" placeholder="Confirmer le mot de passe" required>

<button type="submit">S'inscrire</button>

</form>

</body>
  </html>
