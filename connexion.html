<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7f9;
margin:0;
}

header{
background:#0b6e4f;
color:white;
text-align:center;
padding:25px;
}

.container{
max-width:500px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#0b6e4f;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#0b6e4f;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>Connexion</h1>
<p>L'Espoir des Jeunes</p>
</header>

<div class="container">

<h2>Se connecter</h2>

<input type="email" id="email" placeholder="Adresse e-mail">

<input type="password" id="password" placeholder="Mot de passe">

<button type="submit">Se connecter</button>
    
<a href="index.html">← Retour à l'accueil</a>

</div>

<script>
  // On écoute la soumission du formulaire
  document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault(); // Empêche la page de se recharger

    // Récupération des valeurs avec vos identifiants exacts
    const email = document.getElementById('email').value;
    const motDePasse = document.getElementById('password').value;

    if (!email || !motDePasse) {
      alert('Veuillez remplir tous les champs.');
      return;
    }

    // Recherche du compte enregistré dans la mémoire
    const compteStocke = localStorage.getItem('user_' + email);

    if (compteStocke) {
      const utilisateur = JSON.parse(compteStocke);

      // Vérification du mot de passe
      if (utilisateur.password === motDePasse) {
        // Connexion réussie : on crée la session active
        localStorage.setItem('session_active', JSON.stringify(utilisateur));
        
        alert('Connexion réussie ! Bienvenue dans votre espace.');
        window.location.href = 'dashboard.html';
      } else {
        alert('Mot de passe incorrect.');
      }
    } else {
      alert('Aucun compte trouvé avec cet e-mail. Veuillez vous inscrire.');
    }
  });
</script>
    
</body>
</html>
